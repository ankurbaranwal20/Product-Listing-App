disabled_rules:
  - trailing_whitespace
  - force_unwrapping

opt_in_rules:
  - empty_count

line_length:
  warning: 120
  error: 200

file_length:
  warning: 400
  error: 600

type_body_length:
  warning: 300
  error: 500

function_body_length:
  warning: 50
  error: 100

identifier_name:
  min_length: 2

force_unwrapping:
  severity: error

force_cast:
  severity: error